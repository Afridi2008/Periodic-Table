<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Inter',sans-serif;
  background:#0a0a12;
  color:white;
  overflow-x:hidden;
  
}

/* Animated Background Orb */
.orb{
  position:fixed;
  width:600px;
  height:600px;
  border-radius:50%;
  background:linear-gradient(to top, #c084fc, #7e22ce, #3b0764);
  opacity: 40%;
  filter:blur(120px);
  animation:float 8s ease-in-out infinite alternate;
  z-index:-1;
  top:10%;
  left:20%;
}
@keyframes float{
  from{transform:translateY(-40px) scale(1)}
  to{transform:translateY(40px) scale(1.1)}
}

header{
  text-align:center;
  padding:40px 20px 20px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-bottom:20px;
}
input,select{
  padding:10px 15px;
  border-radius:25px;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.05);
  color:white;
}

/* Table Grid */
.table{
  display:grid;
  grid-template-columns:repeat(18,1fr);
  gap:8px;
  max-width:1400px;
  margin:auto;
  padding:20px;
}

/* Element Card */
.element{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:14px;
  padding:8px;
  text-align:center;
  cursor:pointer;
  transition:0.2s ease;
  transform-style:preserve-3d;
}
.element:hover{
  box-shadow:0 0 20px #9831f88e;
 border:1px solid rgba(234, 55, 250, 0.801);
 
/* Category Colors */
[data-cat="Nonmetal"]{background:rgba(59,130,246,0.25)}
[data-cat="Noble Gas"]{background:rgba(168,85,247,0.25)}
[data-cat="Alkali Metal"]{background:rgba(239,68,68,0.25)}
[data-cat="Alkaline Earth"]{background:rgba(249,115,22,0.25)}
[data-cat="Transition Metal"]{background:rgba(34,197,94,0.25)}
[data-cat="Post-Transition"]{background:rgba(244,114,182,0.25)}
[data-cat="Metalloid"]{background:rgba(234,179,8,0.25)}
[data-cat="Halogen"]{background:rgba(14,165,233,0.25)}
[data-cat="Lanthanide"]{background:rgba(99,102,241,0.25)}
[data-cat="Actinide"]{background:rgba(236,72,153,0.25)}
}
.num{font-size:10px;opacity:0.6}
.sym{font-size:16px;font-weight:700}
.name{font-size:8px;opacity:0.7}


.hidden{opacity:0.1;pointer-events:none}

/* Tooltip Panel */
.tooltip{
  position:fixed;
  width:350px;
  background:rgba(20,20,30,0.97);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.1);
  opacity:0;
  transition:0.2s;
  z-index:1000;
}
.tooltip canvas{
  display:block;
  margin:auto;
  margin-bottom:15px;
}
.tooltip h2{margin-bottom:6px}
.tooltip p{font-size:13px;opacity:0.85;margin-bottom:6px;line-height:1.4}
.locked{pointer-events:auto}

@media(max-width:900px){
  .table{grid-template-columns:repeat(9,1fr)}
}
@media(max-width:600px){
  .table{grid-template-columns:repeat(6,1fr)}
}

</style>
</head>

/* Periodic Position Map */
function getPosition(n){
  const map={
    1:[1,1],2:[1,18],
    3:[2,1],4:[2,2],5:[2,13],6:[2,14],7:[2,15],8:[2,16],9:[2,17],10:[2,18],
    11:[3,1],12:[3,2],13:[3,13],14:[3,14],15:[3,15],16:[3,16],17:[3,17],18:[3,18],
    19:[4,1],20:[4,2],21:[4,3],22:[4,4],23:[4,5],24:[4,6],25:[4,7],26:[4,8],
    27:[4,9],28:[4,10],29:[4,11],30:[4,12],31:[4,13],32:[4,14],33:[4,15],
    34:[4,16],35:[4,17],36:[4,18],
    37:[5,1],38:[5,2],39:[5,3],40:[5,4],41:[5,5],42:[5,6],43:[5,7],44:[5,8],
    45:[5,9],46:[5,10],47:[5,11],48:[5,12],49:[5,13],50:[5,14],51:[5,15],
    52:[5,16],53:[5,17],54:[5,18],
    55:[6,1],56:[6,2],72:[6,4],73:[6,5],74:[6,6],75:[6,7],76:[6,8],77:[6,9],
    78:[6,10],79:[6,11],80:[6,12],81:[6,13],82:[6,14],83:[6,15],84:[6,16],
    85:[6,17],86:[6,18],
    87:[7,1],88:[7,2],104:[7,4],105:[7,5],106:[7,6],107:[7,7],108:[7,8],
    109:[7,9],110:[7,10],111:[7,11],112:[7,12],113:[7,13],114:[7,14],
    115:[7,15],116:[7,16],117:[7,17],118:[7,18]
  };
  if(n>=57&&n<=71)return[8,n-54];
  if(n>=89&&n<=103)return[9,n-86];
  return map[n]||[1,1];
}

const table=document.getElementById("table");
for(let i=0;i<9*18;i++)table.appendChild(document.createElement("div"));

/* Tooltip + Atom */
const tooltip=document.getElementById("tooltip");
const infoDiv=document.getElementById("info");
const canvas=document.getElementById("atomCanvas");
const ctx=canvas.getContext("2d");
let electrons=[],animId,locked=false;

function startAtom(count){
  cancelAnimationFrame(animId);
  electrons=[];
  const shells=[2,8,18,32,32,18,8];
  let remaining=count;
  let radius=40;

  shells.forEach(shell=>{
    if(remaining>0){
      const eCount=Math.min(shell,remaining);
      for(let i=0;i<eCount;i++){
        electrons.push({
          angle:(i/eCount)*Math.PI*2,
          radius:radius,
          speed:0.01+Math.random()*0.01
        });
      }
      remaining-=eCount;
      radius+=25;
    }
  });

  function animate(){
    ctx.clearRect(0,0,250,250);
    ctx.beginPath();
    ctx.arc(125,125,15,0,Math.PI*2);
    ctx.fillStyle="#a855f7";
    ctx.fill();

    electrons.forEach(e=>{
      e.angle+=e.speed;
      const x=125+e.radius*Math.cos(e.angle);
      const y=125+e.radius*Math.sin(e.angle);
      ctx.beginPath();
      ctx.arc(x,y,4,0,Math.PI*2);
      ctx.fillStyle="#fff";
      ctx.fill();
    });

    animId=requestAnimationFrame(animate);
  }
  animate();
  playSound();
}

/*sound*/

function playSound(){
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  const gain=ctx.createGain();
  osc.type="sine";
  osc.frequency.setValueAtTime(600,ctx.currentTime);
  gain.gain.setValueAtTime(0.05,ctx.currentTime);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.08);
}


/* Render Elements */
elements.forEach(el=>{
  const [r,c]=getPosition(el.n);
  const index=(r-1)*18+(c-1);
  const cell=table.children[index];

  cell.className="element";
  cell.dataset.cat=el.cat;
  cell.innerHTML=`
    <div class="num">${el.n}</div>
    <div class="sym">${el.s}</div>
    <div class="name">${el.name}</div>
  `;

  cell.addEventListener("mousemove",e=>{
    if(!locked){
      tooltip.style.left=e.pageX+20+"px";
      tooltip.style.top=e.pageY+20+"px";
    }
  });

  cell.addEventListener("mouseenter",()=>{
    if(!locked){
      tooltip.style.opacity=1;
      infoDiv.innerHTML=`
        <h2>${el.name} (${el.s})</h2>
        <p><strong>Atomic Number:</strong> ${el.n}</p>
        <p><strong>Category:</strong> ${el.cat}</p>
        <p><strong>Description:</strong> ${el.name} is a chemical element belonging to the ${el.cat} group in the periodic table. It plays important roles in industrial, biological, and technological applications depending on its chemical properties.</p>
      `;
      startAtom(el.n);
    }
  });

  cell.addEventListener("mouseleave",()=>{
    if(!locked) tooltip.style.opacity=0;
  });

  cell.addEventListener("click",()=>{
    locked=!locked;
  });

  /* 3D Tilt */
  cell.addEventListener("mousemove",e=>{
    const rect=cell.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=e.clientY-rect.top;
    const rotateX=-(y-rect.height/2)/8;
    const rotateY=(x-rect.width/2)/8;
    cell.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.08)`;
  });
  cell.addEventListener("mouseleave",()=>{
    cell.style.transform="rotateX(0) rotateY(0) scale(1)";
  });
});

/* Search + Filter */
const search=document.getElementById("search");
const filter=document.getElementById("filter");

function applyFilter(){
  const q=search.value.toLowerCase();
  const cat=filter.value;

  document.querySelectorAll(".element").forEach(el=>{
    const name=el.querySelector(".name").textContent.toLowerCase();
    const sym=el.querySelector(".sym").textContent.toLowerCase();
    const num=el.querySelector(".num").textContent;
    const match=name.includes(q)||sym.includes(q)||num.includes(q);
    const matchCat=(cat==="All")||el.dataset.cat===cat;
    el.classList.toggle("hidden",!(match&&matchCat));
  });
}

function searchElement(value){
  document.querySelectorAll(".element").forEach(el=>{
    el.style.display=el.innerText.toLowerCase().includes(value.toLowerCase())
      ? "block":"none";
  });
}
search.addEventListener("input",applyFilter);
filter.addEventListener("change",applyFilter);

</script>
